<!DOCTYPE html>
<html>
<head>
  <title>Doctor Dashboard</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #0f2027, #0b1c24, #020607);
      color: white;
    }

    header {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px);
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      position: sticky;
      top: 0;
    }

    header h2 {
      color: #00e5ff;
    }

    header button {
      background: linear-gradient(90deg, #ff4d4d, #ff1a1a);
      border: none;
      color: white;
      padding: 8px 14px;
      cursor: pointer;
      border-radius: 20px;
      font-weight: bold;
      transition: 0.3s;
    }

    header button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 10px red;
    }

    .container {
      padding: 30px;
    }

    h2 {
      margin-bottom: 15px;
      color: #00e5ff;
    }

    .status-box {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(15px);
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 25px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .status-text {
      font-weight: bold;
      margin-bottom: 10px;
      color: #ccc;
    }

    .toggle-btn {
      padding: 10px 14px;
      border: none;
      cursor: pointer;
      border-radius: 20px;
      background: linear-gradient(90deg, #00e5ff, #00ff95);
      color: black;
      font-weight: bold;
      transition: 0.3s;
    }

    .toggle-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 12px #00e5ff;
    }

    .appointments {
      display: grid;
      gap: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(15px);
      padding: 20px;
      border-radius: 15px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 20px rgba(0,229,255,0.2);
    }

    .card p {
      margin: 6px 0;
      color: #bbb;
    }

    .card b {
      color: white;
    }

    .actions {
      margin-top: 10px;
    }

    .actions button {
      margin-right: 10px;
      padding: 8px 12px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    .accept {
      background: linear-gradient(90deg, #00ff95, #00e676);
      color: black;
    }

    .reject {
      background: linear-gradient(90deg, #ff4d4d, #ff1a1a);
      color: white;
    }

    .actions button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 10px rgba(255,255,255,0.2);
    }

    .call-btn {
      margin-top: 12px;
      background: linear-gradient(90deg, #00e5ff, #00ff95);
      color: black;
      border: none;
      padding: 10px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    .call-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #00e5ff;
    }

  </style>
</head>

<body>

<header>
  <h2 id="welcomeText">Doctor Panel</h2>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">

  <div class="status-box">
    <p class="status-text" id="statusText">Status: Online 🟢</p>
    <button class="toggle-btn" onclick="toggleStatus()">Toggle Availability</button>
  </div>

  <h2>Appointments</h2>
  <div class="appointments" id="appointmentList"></div>

</div>

<script>
  const user = JSON.parse(localStorage.getItem("user"));
  document.getElementById("welcomeText").innerText =
    "Welcome Dr. " + (user?.email || "Doctor");

  let isOnline = true;

  function toggleStatus() {
    isOnline = !isOnline;
    document.getElementById("statusText").innerText =
      "Status: " + (isOnline ? "Online 🟢" : "Offline 🔴");
  }

  // Dummy appointments
  const appointments = [
    { id: "1", patient: "Chetan", date: "2026-03-25", time: "10:00 AM", status: "Pending" },
    { id: "2", patient: "Rahul", date: "2026-03-25", time: "11:00 AM", status: "Pending" }
  ];

  function loadAppointments() {
    const container = document.getElementById("appointmentList");
    container.innerHTML = "";

    appointments.forEach(app => {
      const roomId = "room_" + app.id;

      container.innerHTML += `
        <div class="card">
          <p><b>Patient:</b> ${app.patient}</p>
          <p><b>Date:</b> ${app.date}</p>
          <p><b>Time:</b> ${app.time}</p>
          <p><b>Status:</b> ${app.status}</p>

          <div class="actions">
            <button class="accept" onclick="updateStatus('${app.id}', 'Accepted')">Accept</button>
            <button class="reject" onclick="updateStatus('${app.id}', 'Rejected')">Reject</button>
          </div>

          <button class="call-btn" onclick="joinCall('${roomId}')">
            Join Call 📞
          </button>
        </div>
      `;
    });
  }

  function updateStatus(id, status) {
    const appointment = appointments.find(a => a.id === id);
    if (appointment) {
      appointment.status = status;
      alert("Appointment " + status);
      loadAppointments();
    }
  }

  function joinCall(roomId) {
    window.location.href = `video.html?room=${roomId}`;
  }

  function logout() {
    localStorage.clear();
    window.location.href = "home.html";
  }

  loadAppointments();
</script>

</body>
</html>
