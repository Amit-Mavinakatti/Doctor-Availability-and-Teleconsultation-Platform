<!DOCTYPE html>
<html>
<head>
  <title>Patient Dashboard</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #0f2027, #0b1c24, #020607);
      color: white;
    }

    header {
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    header h2 {
      color: #00e5ff;
    }

    header button {
      background: linear-gradient(90deg, #ff4d4d, #ff1a1a);
      border: none;
      color: white;
      padding: 8px 14px;
      cursor: pointer;
      border-radius: 20px;
      font-weight: bold;
    }

    .container {
      padding: 30px;
    }

    .top-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
      align-items: center;
    }

    input, select {
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.08);
      color: white;
    }

    button.action {
      padding: 10px 15px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      background: linear-gradient(90deg, #00e5ff, #00ff95);
      color: black;
      font-weight: bold;
    }

    .doctor-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 15px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 20px rgba(0,229,255,0.2);
    }

    .card h3 {
      margin-bottom: 5px;
      color: #00e5ff;
    }

    .status {
      font-size: 13px;
      margin-bottom: 10px;
      color: #00ff95;
    }

    .offline {
      color: #ff4d4d;
    }

    button.book {
      background: #00e5ff;
      color: black;
      border: none;
      padding: 8px;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      margin-top: 5px;
      font-weight: bold;
    }

    .call-btn {
      margin-top: 8px;
      background: #00ff95;
      color: black;
      border: none;
      padding: 8px;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      font-weight: bold;
    }

    .nearby-btn {
      margin-top: 20px;
      padding: 12px 20px;
      border: none;
      border-radius: 25px;
      background: linear-gradient(90deg,#00e5ff,#00ff95);
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: #111;
      padding: 25px;
      border-radius: 12px;
      width: 300px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .modal-content h3 {
      color: #00e5ff;
    }

    input {
      width: 100%;
      margin: 8px 0;
    }

    .close {
      background: red;
      color: white;
      border: none;
      padding: 5px 10px;
      float: right;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<header>
  <h2 id="welcomeText">Welcome</h2>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">

  <div class="top-bar">
    <input type="text" id="search" placeholder="Search specialization...">

    <select id="filter">
      <option value="all">All</option>
      <option value="true">Available</option>
      <option value="false">Offline</option>
    </select>

    <button class="action" onclick="loadDoctors()">Refresh</button>
  </div>

  <h2>Available Doctors</h2>
  <div class="doctor-list" id="doctorList"></div>

  <!-- Nearby Button -->
  <div style="text-align:center;">
    <button class="nearby-btn" onclick="goToNearby()">
      📍 Find Nearby Doctors
    </button>
  </div>

</div>

<!-- BOOKING MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <button class="close" onclick="closeModal()">X</button>
    <h3>Book Appointment</h3>

    <input type="date" id="date">
    <input type="time" id="time">

    <button onclick="confirmBooking()">Confirm</button>
  </div>
</div>

<script>
  const user = JSON.parse(localStorage.getItem("user"));
  document.getElementById("welcomeText").innerText =
    "Welcome, " + (user?.email || "Patient");

  const doctorList = document.getElementById("doctorList");
  let selectedDoctor = null;

  // Fake doctors
  const fakeDoctors = [
    { _id: "1", userId: { name: "Dr. Rao" }, specialization: "Cardiologist", available: true },
    { _id: "2", userId: { name: "Dr. Sharma" }, specialization: "Neurologist", available: false },
    { _id: "3", userId: { name: "Dr. Patel" }, specialization: "Orthopedic", available: true },
    { _id: "4", userId: { name: "Dr. Iyer" }, specialization: "Dentist", available: true }
  ];

  async function loadDoctors() {
    let doctors = [];

    try {
      const res = await fetch("http://localhost:5000/api/doctors");

      if (!res.ok) throw new Error("Backend not working");

      doctors = await res.json();

      if (!doctors || doctors.length === 0) {
        doctors = fakeDoctors;
      }

    } catch (err) {
      doctors = fakeDoctors;
    }

    const search = document.getElementById("search").value.toLowerCase();
    const filter = document.getElementById("filter").value;

    if (search) {
      doctors = doctors.filter(d =>
        (d.specialization || "").toLowerCase().includes(search)
      );
    }

    if (filter !== "all") {
      const isAvailable = filter === "true";
      doctors = doctors.filter(d => d.available === isAvailable);
    }

    doctorList.innerHTML = "";

    doctors.forEach(d => {
      const roomId = "room_" + d._id;

      doctorList.innerHTML += `
        <div class="card">
          <h3>${d.userId?.name || d.name}</h3>
          <p>${d.specialization}</p>
          <p class="status ${d.available ? '' : 'offline'}">
            ${d.available ? "🟢 Available" : "🔴 Offline"}
          </p>

          <button class="book" onclick="openModal('${d._id}')">
            Book Appointment
          </button>

          <button class="call-btn" onclick="startCall('${roomId}')">
            Start Call 📞
          </button>
        </div>
      `;
    });
  }

  function goToNearby() {
    window.location.href = "NearByDoctors.html";
  }

  function openModal(id) {
    selectedDoctor = id;
    document.getElementById("modal").style.display = "flex";
  }

  function closeModal() {
    document.getElementById("modal").style.display = "none";
  }

  async function confirmBooking() {
    const date = document.getElementById("date").value;
    const time = document.getElementById("time").value;

    if (!date || !time) {
      alert("Please select date & time");
      return;
    }

    alert("Appointment booked successfully ✅");
    closeModal();
  }

  function startCall(roomId) {
    window.location.href = `video.html?room=${roomId}`;
  }

  function logout() {
    localStorage.clear();
    window.location.href = "home.html";
  }

  loadDoctors();
</script>

</body>
</html>
