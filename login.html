<!DOCTYPE html>
<html>
<head>
  <title>Login</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, #0f2027, #0b1c24, #020607);
      color: white;
    }

    .login-container {
      width: 360px;
      padding: 35px;
      border-radius: 18px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 0 30px rgba(0,229,255,0.1);
      text-align: center;
    }

    h2 {
      margin-bottom: 10px;
      color: #00e5ff;
    }

    .role-text {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.3);
      color: white;
      outline: none;
    }

    input:focus {
      border-color: #00e5ff;
      box-shadow: 0 0 8px rgba(0,229,255,0.4);
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 25px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      background: linear-gradient(90deg, #00e5ff, #00ff95);
      color: black;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #00e5ff;
    }

    .link {
      margin-top: 15px;
      font-size: 14px;
      color: #bbb;
    }

    .link a {
      color: #00e5ff;
      text-decoration: none;
    }

    .error {
      color: #ff4d4d;
      font-size: 13px;
      margin-top: 8px;
    }
  </style>
</head>

<body>

<div class="login-container">
  <h2>Login</h2>
  <p class="role-text">Login to your account</p>

  <input type="email" id="email" placeholder="Enter Email">
  <input type="password" id="password" placeholder="Enter Password">

  <button onclick="login()">Login</button>

  <div class="error" id="errorMsg"></div>

  <div class="link">
    Don't have an account? <a href="register.html">Register</a>
  </div>
</div>

<script>
  function login() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const errorMsg = document.getElementById("errorMsg");

    errorMsg.innerText = "";

    if (!email || !password) {
      errorMsg.innerText = "All fields are required!";
      return;
    }

    const storedUser = JSON.parse(localStorage.getItem("registeredUser"));

    if (!storedUser) {
      errorMsg.innerText = "No registered user found!";
      return;
    }

    if (storedUser.email !== email || storedUser.password !== password) {
      errorMsg.innerText = "Invalid credentials!";
      return;
    }

    // Save logged-in user
    localStorage.setItem("user", JSON.stringify({
      email: storedUser.email,
      role: storedUser.role
    }));

    // Redirect based on stored role (MOST IMPORTANT FIX)
    if (storedUser.role === "doctor") {
      window.location.href = "doctor-dashboard.html";
    } else {
      window.location.href = "patient-dashboard.html";
    }
  }
</script>

</body>
</html>
