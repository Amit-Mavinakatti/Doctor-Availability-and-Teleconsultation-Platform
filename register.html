<!DOCTYPE html>
<html>
<head>
  <title>Register</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, #0f2027, #0b1c24, #020607);
      color: white;
    }

    .container {
      width: 380px;
      padding: 30px;
      border-radius: 18px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 0 30px rgba(0,229,255,0.1);
      text-align: center;
    }

    h2 {
      margin-bottom: 10px;
      color: #00e5ff;
    }

    .role-text {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.3);
      color: white;
      outline: none;
    }

    input:focus {
      border-color: #00e5ff;
      box-shadow: 0 0 8px rgba(0,229,255,0.4);
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 25px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      background: linear-gradient(90deg, #00e5ff, #00ff95);
      color: black;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #00e5ff;
    }

    .error {
      color: #ff4d4d;
      font-size: 13px;
      margin-top: 8px;
    }

    .link {
      margin-top: 15px;
      font-size: 14px;
      color: #bbb;
    }

    .link a {
      color: #00e5ff;
      text-decoration: none;
    }

    .link a:hover {
      text-decoration: underline;
    }

    #specialization {
      display: none;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Register</h2>
  <p class="role-text" id="roleText"></p>

  <input type="text" id="name" placeholder="Full Name">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <!-- Doctor only -->
  <input type="text" id="specialization" placeholder="Specialization (Doctors only)">

  <button onclick="register()">Register</button>

  <div class="error" id="errorMsg"></div>

  <div class="link">
    Already have an account? <a href="login.html">Login</a>
  </div>
</div>

<script>
  const role = localStorage.getItem("role");
  const roleText = document.getElementById("roleText");
  const specializationInput = document.getElementById("specialization");

  if (role === "doctor") {
    roleText.innerText = "Registering as Doctor 👨‍⚕️";
    specializationInput.style.display = "block";
  } else {
    roleText.innerText = "Registering as Patient 👤";
    specializationInput.style.display = "none";
  }

  function register() {
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const specialization = document.getElementById("specialization").value.trim();
    const errorMsg = document.getElementById("errorMsg");

    errorMsg.innerText = "";

    if (!name || !email || !password) {
      errorMsg.innerText = "All fields are required!";
      return;
    }

    if (role === "doctor" && !specialization) {
      errorMsg.innerText = "Please enter specialization!";
      return;
    }

    const user = {
      name,
      email,
      password,
      role,
      specialization: role === "doctor" ? specialization : ""
    };

    localStorage.setItem("registeredUser", JSON.stringify(user));

    alert("Registration successful!");

    window.location.href = "login.html";
  }
</script>

</body>
</html>
